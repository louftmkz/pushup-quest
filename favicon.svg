<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#0a0f0c"/>
  <!-- Upper arm -->
  <ellipse cx="40" cy="42" rx="14" ry="11" fill="#2dba66" transform="rotate(-30 40 42)"/>
  <!-- Bicep bulge highlight -->
  <ellipse cx="37" cy="39" rx="5" ry="4" fill="#7fffc4" opacity="0.4" transform="rotate(-30 37 39)"/>
  <!-- Upper arm bar -->
  <line x1="50" y1="35" x2="28" y2="58" stroke="#2dba66" stroke-width="14" stroke-linecap="round"/>
  <!-- Forearm -->
  <line x1="28" y1="58" x2="68" y2="65" stroke="#2dba66" stroke-width="12" stroke-linecap="round"/>
  <!-- Shoulder -->
  <circle cx="50" cy="35" r="11" fill="#2dba66"/>
  <!-- Elbow -->
  <circle cx="28" cy="58" r="9" fill="#2dba66"/>
  <!-- Fist -->
  <circle cx="68" cy="65" r="10" fill="#2dba66"/>
  <!-- Knuckles -->
  <circle cx="64" cy="58" r="3" fill="#7fffc4" opacity="0.5"/>
  <circle cx="71" cy="57" r="3" fill="#7fffc4" opacity="0.5"/>
</svg>
